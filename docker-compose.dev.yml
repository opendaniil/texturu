name: tubebook-dev

services:
  schemas:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile.dev
      args:
        FOLDER: packages/schemas
    volumes:
      - ./:/app
      # Exclude to avoid conflicts
      - /app/node_modules
      - /app/packages/schemas/node_modules
    environment:
      # for local development
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
    command: "pnpm --filter @tubebook/schemas dev"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile.dev
    depends_on:
      schemas:
        condition: service_started
      postgres:
        condition: service_healthy
    volumes:
      - ./:/app
      # Exclude to avoid conflicts
      - /app/node_modules
      - /app/apps/api/node_modules
    env_file:
      - .env
    ports:
      # for local development
      - '127.0.0.1:${API_PORT}:3000'
    networks:
      - database_network
      - redis_network
    command: "pnpm --filter ./apps/api dev"
    restart: unless-stopped

  # mastra:
  #   build:
  #     context: .
  #     dockerfile: ./apps/mastra/Dockerfile.dev
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   volumes:
  #     - ./:/app
  #     # Exclude to avoid conflicts
  #     - /app/node_modules
  #     - /app/apps/mastra/node_modules
  #   environment:
  #     WATCHPACK_POLLING: true
  #     CHOKIDAR_USEPOLLING: true
  #   env_file:
  #     - .env
  #   ports:
  #     # for local development
  #     - '127.0.0.1:${MASTRA_PORT}:4111'
  #   networks:
  #     - database_network
  #   command: "pnpm --filter ./apps/mastra dev"
  #   restart: unless-stopped

  postgres:
    image: 'pgvector/pgvector:pg18-trixie'
    volumes:
      - postgres-data:/var/lib/postgresql
    env_file:
      - .env
    ports:
      # for local development
      - '127.0.0.1:${POSTGRES_PORT}:5432'
    networks:
      - database_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    user: postgres

  redis:
    image: redis:8-alpine
    ports:
      # for local development
      - '127.0.0.1:${REDIS_PORT}:6379'
    networks:
      - redis_network

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile.dev
    depends_on:
      schemas:
        condition: service_started
      api:
        condition: service_started
    volumes:
      - ./:/app
      # Exclude to avoid conflicts
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    environment:
      # for local development
      WATCHPACK_POLLING: "true"
      WATCHPACK_POLLING_INTERVAL: "500"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
    env_file:
      - .env
    ports:
      # for local development
      - '127.0.0.1:${WEB_PORT}:80'
    command: "pnpm --filter ./apps/web dev"
    restart: unless-stopped

networks:
  database_network:
    driver: bridge
  redis_network:
    driver: bridge

volumes:
  postgres-data:
